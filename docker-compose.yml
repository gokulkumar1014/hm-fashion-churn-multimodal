version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8080"
    volumes:
      - ./backend:/app
      - /app/venv
    environment:
      - PORT=8080
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
  
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0"
